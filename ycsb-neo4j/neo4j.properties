# =============================================================
# neo4j.properties — configuração do binding e workload YCSB
# =============================================================

# --- Ligação ao Neo4j ---
neo4j.url=bolt://localhost:7687
neo4j.user=neo4j
neo4j.password=password
neo4j.database=neo4j

# --- Workload base (pode ser sobreescrito na linha de comandos) ---
workload=site.ycsb.workloads.CoreWorkload

# Número de registos a inserir na fase de load
recordcount=10000

# Número de operações na fase de run
operationcount=10000

# Nome da "tabela" (será usado como label do nó no Neo4j)
table=usertable

# Número de campos por registo
fieldcount=10

# Tamanho (bytes) de cada campo
fieldlength=100

# --- Distribuição de operações (Workload A: 50% read / 50% update) ---
readproportion=0.5
updateproportion=0.5
scanproportion=0
insertproportion=0

# Distribuição dos acessos às chaves
requestdistribution=zipfian

# Para workload E (scan): tamanho máximo do scan
maxscanlength=100
scanlengthdistribution=uniform
